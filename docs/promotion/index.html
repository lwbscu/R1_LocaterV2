<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R1_LocaterV2 | STM32G4 多传感器定位板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101b;
      --panel: #101b2a;
      --line: #28435f;
      --text: #e8f0f8;
      --muted: #95a7bb;
      --cyan: #27dcff;
      --red: #ff5260;
      --yellow: #ffc240;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(115deg, rgba(39, 220, 255, 0.07) 0 1px, transparent 1px 80px),
        radial-gradient(circle at 80% 0%, rgba(39, 220, 255, 0.12), transparent 34%),
        var(--bg);
      color: var(--text);
      font: 16px/1.65 "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }
    a {
      color: var(--cyan);
    }
    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }
    .poster {
      padding: 14px;
      background: linear-gradient(180deg, rgba(22, 38, 58, 0.96), rgba(10, 18, 30, 0.96));
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }
    .poster img {
      display: block;
      width: 100%;
      border-radius: 14px;
      background: #050b12;
    }
    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }
    .video-card {
      background: linear-gradient(180deg, rgba(22, 38, 58, 0.96), rgba(10, 18, 30, 0.96));
      border: 2px solid rgba(255, 82, 96, 0.9);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
    }
    .video-card h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0;
    }
    .video-card p {
      margin: 0 0 14px;
      color: var(--muted);
    }
    .video-card video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      border: 1px solid rgba(149, 167, 187, 0.25);
      background: #050b12;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
      justify-content: center;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border-radius: 10px;
      padding: 0 15px;
      text-decoration: none;
      color: #06101a;
      background: var(--cyan);
      font-weight: 700;
    }
    .button.secondary {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
    }
    .note {
      margin: 18px auto 0;
      max-width: 820px;
      text-align: center;
      color: var(--muted);
    }
    .footer {
      margin-top: 32px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 820px) {
      .videos {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="poster" aria-label="R1_LocaterV2 宣传海报">
      <img src="r1-locaterv2-poster.png" alt="R1_LocaterV2 STM32G4 多传感器定位板宣传海报">
    </section>

    <section class="videos" aria-label="演示视频">
      <article class="video-card">
        <h2>仿真视频</h2>
        <p>上位机地图回放、DT35 raycast、轨迹和传感器状态演示。</p>
        <video controls muted playsinline poster="r1-locaterv2-field-model-overview.png">
          <source src="r1-locaterv2-sim-preview.mp4" type="video/mp4">
        </video>
      </article>
      <article class="video-card">
        <h2>实车视频</h2>
        <p>R1 实车链路、定位板、场地结构和传感器联调现场。</p>
        <video controls muted playsinline poster="r1-locaterv2-real-car-frame.png">
          <source src="r1-locaterv2-real-car-h264.mp4" type="video/mp4">
        </video>
      </article>
    </section>

    <p class="note">完整 1 分钟串联演示可播放 <a href="r1-locaterv2-demo.mp4">r1-locaterv2-demo.mp4</a>；README 中同时提供 GIF 预览，避免部分平台屏蔽 video 标签。</p>

    <nav class="links" aria-label="相关链接">
      <a class="button" href="r1-locaterv2-demo.mp4">完整演示视频</a>
      <a class="button secondary" href="r1-locaterv2-demo-teaser.gif">GIF 预览</a>
      <a class="button secondary" href="../../README.md">返回 README</a>
    </nav>

    <p class="footer">R1_LocaterV2 · STM32G4 多传感器定位调试闭环</p>
  </main>
</body>
</html>
