# DAPLink配置文件 for STM32G474VET6
# 适用于ATL-HSWLDBG无线调试器 [高速版]

# 选择DAPLink接口
source [find interface/cmsis-dap.cfg]

# 传输协议选择SWD
transport select swd

# 设置适配器速度 (开始时使用较低速度确保连接稳定)
adapter speed 1000

# STM32G474的配置 - 直接使用官方配置
source [find target/stm32g4x.cfg]

# 修改复位配置为更兼容的方式
reset_config none separate

# 禁用复位时的时钟配置以避免超时
$_TARGETNAME configure -event reset-init {
    echo "Target reset - keeping simple configuration"
}

# 连接时的配置
$_TARGETNAME configure -event gdb-attach {
    echo "DAPLink connected to STM32G474VET6"
    # 不强制halt，让目标自然停止
}

# 编程前的准备
$_TARGETNAME configure -event reset-start {
    echo "Programming started - using low speed"
    adapter speed 1000
}

# 编程后恢复
$_TARGETNAME configure -event reset-end {
    echo "Programming completed"
    adapter speed 2000
}